name: 🐛 Bug 报告
description: 提交一份 Bug 报告帮助我们改进
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间填写这份 Bug 报告！

  - type: dropdown
    id: device
    attributes:
      label: 笔记本型号
      description: 你的设备型号是什么？
      options:
        - MateBook X Pro 2024 (MACH-WX9)
        - MateBook E GO
        - 荣耀 MagicBook (BRN-H76)
        - 其他（请在备注中注明）
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 系统版本
      description: 你的 Windows 版本号（Win+R → 输入 `winver` → 回车）
      placeholder: e.g. Windows 11 23H2 (22631.XXXX)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述这个 Bug 是什么
      placeholder: 当我点击...时，程序...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何复现这个行为？
      placeholder: |
        1. 打开程序
        2. 切换到「XX」选项卡
        3. 点击「XX」按钮
        4. 看到错误提示
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果可以，请附上截图帮助说明你的问题
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 错误日志
      description: 如果有错误日志，请粘贴在此处
      render: text
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 确认事项
      options:
        - label: 我已检查 [已有 Issues](https://github.com/HelloZER0/HuaweiWmiControl/issues)，没有重复
          required: true
        - label: 我使用的是最新版本
          required: true
